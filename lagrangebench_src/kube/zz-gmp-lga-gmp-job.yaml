apiVersion: batch/v1
kind: Job
metadata:
  name: zz-gmp-lga-gmp
  namespace: cms-ml
  labels:
    jobgroup: pulse-pretrain
spec:
  backoffLimit: 0
  parallelism: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - gpn-fiona-mizzou-2.rnet.missouri.edu
                - rci-nrp-gpu-05.sdsu.edu
                - node-2-2.sdsc.optiputer.net
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-GeForce-GTX-1080-Ti
                - NVIDIA-GeForce-GTX-2080-Ti
                - NVIDIA-GeForce-RTX-3090
                - NVIDIA-GeForce-RTX-4090
      containers:
      - name: training
        image: gitlab-registry.nrp-nautilus.io/jmduarte/hbb_interaction_network:latest
        imagePullPolicy: Always
        command:
        - /bin/bash
        - -lc
        args:
        - |
          set -euo pipefail

          ENV_PREFIX=/j-jepa-vol/conda_envs/lgbench310
          PY="${ENV_PREFIX}/bin/python"
          PIP="${ENV_PREFIX}/bin/pip"
          REPO=/j-jepa-vol/gmp-transfer-bench/lagrangebench_src
          RUN_TAG=$(date +%Y%m%d-%H%M%S)

          mkdir -p /j-jepa-vol/gmp_transfer/ckp /j-jepa-vol/gmp_transfer/logs
          cd "${REPO}"

          echo "[preflight] NVIDIA visibility"
          nvidia-smi -L

          echo "[preflight] Installing GPU-enabled JAX runtime"
          "${PIP}" install -U --no-cache-dir "jax[cuda12]==0.4.29"

          echo "[preflight] Verifying JAX GPU backend"
          "${PY}" -c 'import jax; devs=jax.devices(); print("jax devices:", devs); assert any(d.platform == "gpu" for d in devs), f"GPU requested but JAX devices are {devs}"'

          "${PY}" -u main.py \
            config=configs/tgv_2d/segnn_gmp.yaml \
            mode=train gpu=0 dtype=float32 \
            train.num_workers=0 train.step_max=20000 \
            logging.eval_steps=5000 \
            eval.train.n_trajs=10 \
            logging.wandb=false \
            logging.run_name=segnn_tgv2d_gmp_train_${RUN_TAG} \
            logging.ckp_dir=/j-jepa-vol/gmp_transfer/ckp \
            2>&1 | tee /j-jepa-vol/gmp_transfer/logs/segnn_gmp_train_${RUN_TAG}.log
        resources:
          requests:
            cpu: "4"
            memory: 22Gi
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: 26Gi
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: j-jepa-vol
          mountPath: /j-jepa-vol
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: j-jepa-vol
        persistentVolumeClaim:
          claimName: j-jepa-vol
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi
